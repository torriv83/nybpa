kind: pipeline
type: docker
name: ci-cd

steps:
  - name: prepare-environment
    image: node:20-bullseye
    commands:
      - apt-get update && apt-get install -y php-cli unzip git libzip-dev libpng-dev libonig-dev libxml2-dev zip curl
      - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      - composer install --prefer-dist --no-interaction
      - npm ci

  - name: pint
    image: laravelsail/php82-composer
    commands:
      - composer install --no-interaction
      - ./vendor/bin/pint --test

  - name: phpstan
    image: laravelsail/php82-composer
    commands:
      - composer install --no-interaction
      - ./vendor/bin/phpstan analyse

  - name: pest-tests
    image: laravelsail/php82-composer
    environment:
      APP_ENV: testing
      APP_KEY:
        from_secret: APP_KEY
    commands:
      - composer install --no-interaction
      - php artisan test --parallel

  - name: build-assets
    image: node:20
    commands:
      - npm ci
      - npm run build

  - name: merge-to-staging
    image: alpine
    depends_on:
      - build-assets
    environment:
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
    commands:
      - apk add git
      - git config --global user.name "Tor Rivera"
      - git config --global user.email "tor@trivera.net"
      - git remote set-url origin https://oauth2:$GITEA_TOKEN@gitea.torriv.synology.me/torriv/nybpa.git
      - git fetch origin
      - git checkout staging || git checkout -b staging
      - git merge --no-edit devtest
      - git push origin staging

  - name: merge-to-master
    image: alpine
    depends_on:
      - merge-to-staging
    environment:
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
    commands:
      - apk add git
      - git config --global user.name "Tor Rivera"
      - git config --global user.email "tor@trivera.net"
      - git remote set-url origin https://oauth2:$GITEA_TOKEN@gitea.torriv.synology.me/torriv/nybpa.git
      - git fetch origin
      - git checkout master || git checkout -b master
      - git merge --no-edit staging
      - git push origin master

trigger:
  branch:
    include:
      - devtest
