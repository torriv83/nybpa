kind: pipeline
name: ci-cd
type: docker

steps:
  - name: prepare-cache
    image: alpine
    commands:
      - mkdir -p /tmp/cache/nybpa/composer-npm-cache/vendor
      - mkdir -p /tmp/cache/nybpa/composer-npm-cache/node_modules
    volumes:
      - name: cache
        path: /tmp/cache

  - name: restore-cache
    image: meltwater/drone-cache
    pull: true
    settings:
      backend: filesystem
      restore: true
      cache_key: composer-npm-cache
      archive_format: gzip
      mount:
        - path: /tmp/cache/nybpa/composer-npm-cache/vendor
        - path: /tmp/cache/nybpa/composer-npm-cache/node_modules
    volumes:
      - name: cache
        path: /tmp/cache

  - name: prepare-environment
    image: laravelsail/php83-composer
    depends_on:
      - restore-cache
    commands:
      - apt-get update && apt-get install -y unzip git zip curl libzip-dev libpng-dev libonig-dev libxml2-dev libgd-dev libicu-dev
      - docker-php-ext-install intl gd
      - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      - apt-get install -y nodejs
      - composer install --prefer-dist --no-interaction
      - npm ci

  - name: build-assets
    image: node:20
    depends_on:
      - prepare-environment
    commands:
      - npm ci
      - npm run build

  - name: phpstan
    image: laravelsail/php83-composer
    depends_on:
      - build-assets
    environment:
      PHP_MEMORY_LIMIT: 512M
    commands:
      - apt-get update && apt-get install -y unzip git zip curl libzip-dev libpng-dev libonig-dev libxml2-dev libgd-dev libicu-dev
      - docker-php-ext-install intl gd
      - composer install --prefer-dist --no-interaction
      - ./vendor/bin/phpstan analyse --memory-limit=512M || true

  - name: pest-tests
    image: laravelsail/php83-composer
    depends_on:
      - build-assets
    environment:
      APP_ENV: testing
      APP_KEY:
        from_secret: APP_KEY
      APP_DEBUG: true
      APP_URL: http://localhost
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
    commands:
      - apt-get update && apt-get install -y unzip git zip curl libzip-dev libpng-dev libonig-dev libxml2-dev libgd-dev libicu-dev pkg-config libsqlite3-dev
      - docker-php-ext-install intl gd pdo pdo_sqlite
      - composer install --prefer-dist --no-interaction
      - php artisan test --parallel

  - name: rebuild-cache
    image: meltwater/drone-cache
    pull: true
    depends_on:
      - pest-tests
    settings:
      backend: filesystem
      rebuild: true
      cache_key: composer-npm-cache
      archive_format: gzip
      mount:
        - path: /tmp/cache/nybpa/composer-npm-cache/vendor
        - path: /tmp/cache/nybpa/composer-npm-cache/node_modules
    volumes:
      - name: cache
        path: /tmp/cache

volumes:
  - name: cache
    temp: {}

trigger:
  branch:
    include:
      - devtest
