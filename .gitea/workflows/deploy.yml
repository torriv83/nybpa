pipelines:
  default:
    - step:
        name: Prepare Environment
        image: php:8.4
        caches:
          - composer
          - node_modules
        commands:
          # Installere nødvendige systempakker og PHP-utvidelser
          - apt-get update -yqq
          - apt-get install -yqq git libpq-dev libzip-dev curl libpng-dev libonig-dev libxml2-dev libicu-dev libgd-dev
          - docker-php-ext-install pdo_mysql zip intl gd

          # Installer Composer
          - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

          # Installer Node.js v16.x og npm
          - curl -fsSL https://deb.nodesource.com/setup_16.x | bash -
          - apt-get install -y nodejs
          - npm --version  # Bekrefter at npm er installert

          # Installer PHP og Node-avhengigheter
          - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts --verbose
          - npm ci --verbose  # Installerer npm-avhengigheter

    - step:
        name: Build Frontend Assets
        image: node:20
        caches:
          - node_modules
        commands:
          - npm run build  # Bygg frontend-ressurser (FilamentPHP eller andre Vue/React-komponenter)

    - step:
        name: PHPStan Analysis
        image: laravelsail/php83-composer
        environment:
          PHP_MEMORY_LIMIT: 1024M  # Øker PHP minnegrensen til 1 GB
        caches:
          - composer
        commands:
          - ./vendor/bin/phpstan analyse --memory-limit=1024M || true  # Kjør PHPStan med økt minne

    - step:
        name: Optimize Autoloader
        image: laravelsail/php83-composer
        caches:
          - composer
        commands:
          - composer install --optimize-autoloader --no-dev --verbose  # Optimiserer autoloader

    - step:
        name: Cache Configuration, Routes, and Views
        image: laravelsail/php83-composer
        caches:
          - composer
        commands:
          - php artisan config:cache
          - php artisan route:cache
          - php artisan view:cache  # Cache-konfigurasjon, ruter og visninger

    - step:
        name: Optimize
        image: laravelsail/php83-composer
        caches:
          - composer
        commands:
          - php artisan optimize  # Kjører Laravel-optimalisering

    - step:
        name: Pest Tests
        image: laravelsail/php83-composer
        environment:
          APP_ENV: testing
          APP_KEY:
            from_secret: APP_KEY
          APP_DEBUG: true
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        caches:
          - composer
        commands:
          - php artisan test --parallel  # Kjør tester

