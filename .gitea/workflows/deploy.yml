name: Prepare and Build Project
on:
  push:
    branches:
      - devtest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Sjekk ut repository
      - name: Check out repository
        uses: actions/checkout@v2

      # Installer nødvendige avhengigheter
      - name: Install dependencies
        run: |
          apt-get update -yqq
          apt-get install -yqq git libpq-dev libzip-dev curl libpng-dev libonig-dev libxml2-dev libicu-dev libgd-dev
          docker-php-ext-install pdo_mysql zip intl gd
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          curl -fsSL https://deb.nodesource.com/setup_16.x | bash -
          apt-get install -y nodejs
          npm --version
          composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts --verbose
          npm ci --verbose

      # Kjør PHPStan
      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=1024M || true

      # Bygg frontend assets
      - name: Build frontend assets
        run: npm run build

      # Kjør tester
      - name: Run tests
        run: php artisan test --parallel

      # Cache-konfigurasjon, ruter og visninger
      - name: Cache configuration, routes, and views
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      # Optimaliser Laravel
      - name: Optimize
        run: php artisan optimize

